spring.application.name=EventManagement
server.port=8080


# ===== Database Configuration =====
# SQL Server Configuration
spring.datasource.url=jdbc:sqlserver://tahir.database.windows.net:1433;databaseName=EtkinlikYonetimSistemi;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sqladmin
spring.datasource.password=TahirGök1905
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===== JPA / Hibernate Configuration =====
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ===== Logging Configuration =====
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===== Jackson Configuration =====
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=GMT+3

# ===== Error Handling =====
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# ===== Email Configuration (Gmail SMTP) =====
# NOT: Üretim ortamında application-prod.properties dosyasında güvenli şekilde saklanmalıdır
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=goktahir4@gmail.com
spring.mail.password=uyplqkuybgyxdiex
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===== Swagger / OpenAPI Configuration =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs

# ===== JWT Configuration =====
app.jwt.secret=mySecretKeyForJwtTokenGenerationThatIsLongEnoughForHS256Algorithm
app.jwt.expiration=86400000
app.jwt.refresh.expiration=604800000

# ===== Security Configuration =====
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN

# ===== Redis Cache Configuration =====
# DİKKAT: Bilgisayarında Redis kurulu/açık değilse Spring Boot başlarken "Connection refused" hatası verir. 
# Bu yüzden şimdilik önbellekleme kapatıldı (none). Redis kurduğunda 'none' yerine 'redis' yazıp alttaki yorumları kaldırabilirsin.
spring.cache.type=none
