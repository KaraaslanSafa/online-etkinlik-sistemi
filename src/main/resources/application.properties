# spring.redis.port=6379
# spring.redis.password=
# spring.redis.database=0
# spring.redis.timeout=2000ms
# spring.cache.redis.time-to-live=600000

# ===== Stripe Payment Configuration =====
stripe.api.key=sk_test_your_stripe_key
stripe.webhook.secret=whsec_test_your_webhook_secret

# ===== Actuator Configuration =====
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# ===== Pagination Configuration =====
app.pagination.default-page-size=20
app.pagination.max-page-size=100

# ===== File Upload Configuration =====
app.upload.dir=/uploads
app.upload.max-file-size=10MB
app.upload.allowed-extensions=jpg,jpeg,png,gif,pdf

# ===== Cors Configuration =====
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true